<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/Styles/Clientes.css">
    <link rel="stylesheet" href="/Styles/Menu.css">
</head>
<body>
    <div id="menu-superior">
        <a href="/App" class="item-menu">Dashboard</a>
        <a href="/App/Clientes" class="item-menu">Clientes</a>
        <a href="/App/Projetos" class="item-menu">Projetos</a>
        <a href="/App/Estoque" class="item-menu">Estoque</a>
        <a href="/App/Pedido" class="item-menu">Vendas</a>
    </div>
    <div id="cliprinc">
        <div id="novocli">
            <h1>Clientes</h1>
            <a href="/App/Clientes/Novo" class="btn-primary">Novo Cliente</a>
        </div>
        <div id="clientesList"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('clientesList');

            async function carregarClientes() {
                try {
                    const response = await fetch('/api/clientes');
                    const clientes = await response.json();

                    if (clientes.length === 0) {
                        listContainer.innerHTML = '<h1 style="color: #64748b; opacity: 0.5; margin-top: 50px;">Nenhum cliente cadastrado</h1>';
                        return;
                    }

                    listContainer.innerHTML = clientes.map(cli => `
                        <div class="cliente-card" onclick="window.location.href='/App/Clientes/Editar?id=${cli.id}'">
                            <div class="cliente-header">
                                <strong>${cli.nome}</strong>
                            </div>
                        </div>
                    `).join('');
                } catch (error) { console.error('Erro:', error); }
            }
            carregarClientes();
        });
    </script>
</body>
</html>
