<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Projeto</title>
    <link rel="stylesheet" href="/Styles/Novo_Projeto.css">
    <link rel="stylesheet" href="/Styles/Menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .btn-excluir {
            width: 100%;
            height: 48px;
            border: 1.5px solid #fee2e2;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            margin-top: 12px;
            color: #ef4444;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-excluir:hover {
            background-color: #fef2f2;
            border-color: #fca5a5;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <div id="menu-superior">
        <a href="/App" class="item-menu">Dashboard</a>
        <a href="/App/Clientes" class="item-menu">Clientes</a>
        <a href="/App/Projetos" class="item-menu">Projetos</a>
        <a href="/App/Estoque" class="item-menu">Estoque</a>
        <a href="/App/Pedido" class="item-menu">Vendas</a>
    </div>
    <div id="novoprojrinc">
        <h1>Editar Projeto</h1>
        
        <label class="label-campo">Nome do Projeto</label>
        <input type="text" class="campnovoproj" id="nomeInput">
        
        <label class="label-campo">Etapa</label>
        <input type="text" class="campnovoproj" id="etapaInput">
        
        <div id="botproj">
            <h1>Salvar Alterações</h1>
        </div>

        <div class="btn-excluir" id="btnExcluir">
            Excluir Projeto
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projetoId = urlParams.get('id');

        async function carregarDados() {
            const response = await fetch(`/api/projetos/${projetoId}`);
            const data = await response.json();
            document.getElementById('nomeInput').value = data.nome;
            document.getElementById('etapaInput').value = data.etapa;
        }

        document.getElementById('botproj').addEventListener('click', async () => {
            const response = await fetch(`/api/projetos/${projetoId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: document.getElementById('nomeInput').value,
                    etapa: document.getElementById('etapaInput').value
                })
            });
            if (response.ok) window.location.href = '/App/Projetos';
            else alert('Erro ao atualizar projeto');
        });

        document.getElementById('btnExcluir').addEventListener('click', async () => {
            if (!confirm('Deseja excluir este projeto?')) return;
            const response = await fetch(`/api/projetos/${projetoId}`, { method: 'DELETE' });
            if (response.ok) window.location.href = '/App/Projetos';
            else {
                const data = await response.json();
                alert(data.erro || 'Erro ao excluir');
            }
        });

        carregarDados();
    </script>
</body>
</html>
