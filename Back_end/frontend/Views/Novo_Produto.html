<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Produto</title>
    <link rel="stylesheet" href="/Styles/Novo_Produto.css">
    <link rel="stylesheet" href="/Styles/Menu.css">
</head>
<body>
    <div id="menu-superior">
        <a href="/App" class="item-menu">Home</a>
        <a href="/App/Clientes" class="item-menu">Clientes</a>
        <a href="/App/Projetos" class="item-menu">Projetos</a>
        <a href="/App/Estoque" class="item-menu">Estoque</a>
        <a href="/App/Pedido" class="item-menu">Pedidos</a>
    </div>
    <div id="novoprodprinc">
        <div id="titulo_pag">
            <h1>Cadastrar Produto</h1>
        </div>
        <div>
            <h1>Nome</h1>
        </div>
        <div>
            <input type="text" class="campnovoprod" id="nomeInput">
        </div>
        <div>
            <h1>Descrição</h1>
        </div>
        <div>
            <input type="text" class="campnovoprod" id="descInput">
        </div>
        <div>
            <h1>Quantidade</h1>
        </div>
        <div>
            <input type="number" class="campnovoprod" id="quantInput">
        </div>
        <div id='botprod'>
            <h1>Salvar no Estoque</h1>
        </div>
    </div>

    <script>
        document.getElementById('botprod').addEventListener('click', async () => {
            const nome = document.getElementById('nomeInput').value;
            const descricao = document.getElementById('descInput').value;
            const quantidade = document.getElementById('quantInput').value;

            if (!nome || !quantidade) {
                alert('Por favor, preencha o nome e a quantidade.');
                return;
            }

            try {
                const response = await fetch('/api/produtos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, descricao, quantidade: parseInt(quantidade) })
                });

                if (response.ok) {
                    window.location.href = '/App/Estoque';
                } else {
                    const data = await response.json();
                    alert('Erro ao salvar: ' + (data.erro || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
