<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Projeto</title>
    <link rel="stylesheet" href="/Styles/Novo_Projeto.css">
    <link rel="stylesheet" href="/Styles/Menu.css">
    <script src="/Models/Novo_Projeto.js"></script>
</head>
<body>
    <div id="menu-superior">
        <a href="/App" class="item-menu">Home</a>
        <a href="/App/Clientes" class="item-menu">Clientes</a>
        <a href="/App/Projetos" class="item-menu">Projetos</a>
        <a href="/App/Estoque" class="item-menu">Estoque</a>
        <a href="/App/Pedido" class="item-menu">Pedidos</a>
    </div>
    <div id="novoprojrinc">
        <div id="novoproj">
            <h1>Novo Projeto</h1>
        </div>
        <div>
            <h1>Nome do Projeto</h1>
        </div>
        <div>
            <input type="text" class="campnovoproj" id="nomeInput">
        </div>
        <div>
            <h1>Ambiente</h1>
        </div>
        <div>
            <input type="text" class="campnovoproj" id="ambienteInput">
        </div>
        <div>
            <h1>Cliente</h1>
        </div>
        <div>
            <input type="text" class="campnovoproj" id="clienteInput" list="clientesDatalist" placeholder="Digite o nome do cliente">
            <datalist id="clientesDatalist"></datalist>
            <input type="hidden" id="clienteIdInput">
        </div>
        <div>
            <h1>Etapa</h1>
        </div>
        <div>
            <input type="text" class="campnovoproj" id="etapaInput" readonly>
        </div>
        <div id="botproj">
            <h1>Criar Projeto</h1>
        </div>
    </div>
</body>
</html>
