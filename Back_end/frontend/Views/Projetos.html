<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 2026 | Projetos</title>
    <link rel="stylesheet" href="/Styles/Projetos.css">
    <link rel="stylesheet" href="/Styles/Menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="menu-superior">
        <a href="/App" class="item-menu">Dashboard</a>
        <a href="/App/Clientes" class="item-menu">Clientes</a>
        <a href="/App/Projetos" class="item-menu">Projetos</a>
        <a href="/App/Estoque" class="item-menu">Estoque</a>
        <a href="/App/Pedido" class="item-menu">Vendas</a>
    </div>
    <div id="cliprinc">
        <div id="novocli">
            <h1>Projetos</h1>
            <a href="/App/Projetos/Novo" class="btn-primary">Novo Projeto</a>
        </div>
        <div id="projlist"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const listContainer = document.getElementById('projlist');

            async function carregarProjetos() {
                try {
                    const response = await fetch('/api/projetos');
                    const projetos = await response.json();

                    if (projetos.length === 0) {
                        listContainer.innerHTML = '<h1 style="color: #64748b; opacity: 0.5; margin-top: 50px; text-align: center; font-size: 20px;">Nenhum projeto encontrado</h1>';
                        return;
                    }

                    listContainer.innerHTML = projetos.map(proj => `
                        <div class="projeto-card" onclick="window.location.href='/App/Projetos/Editar?id=${proj.id}'">
                            <div class="projeto-header">
                                <strong>${proj.ambiente || 'Geral'}</strong>
                                <span class="projeto-meta">${proj.clienteNome || 'Cliente'}</span>
                            </div>
                        </div>
                    `).join('');
                } catch (error) { console.error('Erro:', error); }
            }
            carregarProjetos();
        });
    </script>
</body>
</html>
