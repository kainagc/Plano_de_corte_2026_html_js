<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header-projeto">
            <h2>Editar Cliente</h2>
        </div>
        <div class="form-group">
            <label>Nome:</label>
            <input type="text" id="nomeInput" class="input-field">
            <label>CPF:</label>
            <input type="text" id="cpfInput" class="input-field">
            <label>Endereço:</label>
            <input type="text" id="enderecoInput" class="input-field">
            <label>Telefone:</label>
            <input type="text" id="telefoneInput" class="input-field">
            <label>Data:</label>
            <input type="text" id="dataInput" class="input-field">
        </div>
        <div class="actions">
            <button id="btnSalvar">Salvar Alterações</button>
            <button id="btnExcluir" style="background-color: red; color: white;">Excluir Cliente</button>
        </div>
        <a href="/App/Clientes">Voltar</a>
    </div>
    <script src="/Models/Editar_Cliente.js"></script>
</body>
</html>
