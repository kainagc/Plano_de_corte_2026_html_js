version: "3.9"

services:
  app:
    build: ./Back_end
    container_name: plano_corte_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - ./Front_end/src:/app/frontend
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=plano_de_corte_2026

  db:
    image: postgres:15
    container_name: plano_corte_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plano_de_corte_2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
